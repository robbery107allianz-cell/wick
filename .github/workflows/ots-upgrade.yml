name: OTS Upgrade

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install opentimestamps-client
      - name: Upgrade pending proofs
        run: find snapshots -name '*.ots' -exec ots upgrade {} \;
      - name: Regenerate index
        # same anti-recursion reason as ots-stamp.yml: a proof going from
        # pending to complete never reaches the public page otherwise
        run: node scripts/generate-index.mjs
      - name: Commit upgraded proofs and index
        run: |
          git config user.name "wick-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A 'snapshots/**/*.ots' docs/index.html
          git diff --cached --quiet || git commit -m "ots: upgrade pending proofs"
          git pull --rebase origin main
          git push
