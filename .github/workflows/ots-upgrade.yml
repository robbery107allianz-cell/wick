name: OTS Upgrade

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install opentimestamps-client
      - name: Upgrade pending proofs
        run: find snapshots -name '*.ots' -exec ots upgrade {} \;
      - name: Commit upgraded proofs
        run: |
          git config user.name "wick-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A 'snapshots/**/*.ots'
          git diff --cached --quiet || git commit -m "ots: upgrade pending proofs"
          git pull --rebase origin main
          git push
