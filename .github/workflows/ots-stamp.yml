name: OTS Stamp

on:
  push:
    paths:
      - 'snapshots/**/*.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  stamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: pip install opentimestamps-client
      - name: Stamp snapshots missing a proof
        run: |
          set -e
          find snapshots -name '*.html' | while read -r f; do
            [ -f "$f.ots" ] || ots stamp "$f"
          done
      - name: Regenerate index
        # A GITHUB_TOKEN push doesn't trigger other workflows (anti-recursion),
        # so Build Pages never runs after this - rebuild the index here instead
        # of relying on that cross-workflow trigger.
        run: node scripts/generate-index.mjs
      - name: Commit new proofs and index
        run: |
          git config user.name "wick-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A 'snapshots/**/*.ots' docs/index.html
          git diff --cached --quiet || git commit -m "ots: stamp new snapshots"
          git pull --rebase origin main
          git push
